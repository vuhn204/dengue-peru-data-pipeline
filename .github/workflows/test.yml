name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas SQLAlchemy python-dotenv matplotlib seaborn pytest

      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest tests/test_processing.py -v